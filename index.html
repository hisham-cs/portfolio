<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/portfolio/favicon.svg" />
    <meta name="description" content="Hisham Al-Malki — Computer Science graduate specializing in AI, Machine Learning, Computer Vision, and Data Analysis. Portfolio showcasing medical imaging AI, academic assistants, and analytics dashboards." />
    <meta name="theme-color" content="#17140f" />
    <!-- Self-hosted (see src/index.css @font-face + DESIGN.md) — this is
         the primary text face, preloaded since it's the LCP-critical font
         for the hero and body copy. -->
    <link
      rel="preload"
      href="/fonts/plus-jakarta-sans-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>Hisham Al-Malki | Portfolio</title>
    <script>
      // Apply saved theme before first paint to avoid a flash of wrong theme.
      const theme = localStorage.getItem('theme')
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
